name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Runs on pull requests only: dependency-review-action needs a base/head
  # diff to compare, so it can't evaluate a plain push.
  dependency-review:
    name: Integration Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  ui-test-http:
    name: UI Test over HTTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start app and database
        run: docker compose up -d db app

      - name: Wait for app to respond
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          docker compose logs
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install requests

      - name: Run HTTP integration tests
        run: python tests/test_http.py

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
